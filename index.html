<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tipping Point — Observatory & Debrief Tool</title>
<style>
/* ============================================================
   TIPPING POINT OBSERVATORY
   Single-file facilitator tool: explain the game, log play live,
   turn what you watch into clear measures + suggestions.
   Design: DEFT (Design / Engage / Facilitate / Transfer) + Sweller CLT.
   Palette matches the physical game tokens.
   ============================================================ */
:root{
  --forest:#2e7d32; --forest-soft:#e3f0e4;
  --house:#1565c0;  --house-soft:#e3edf9;
  --resource:#546e7a; --resource-soft:#e9edef;
  --waste:#c62828;  --waste-soft:#fbe6e6;
  --accent:#0f766e; --accent-soft:#dcf1ee;
  --ink:#16282f; --muted:#5d7079; --line:#e2e8ea;
  --bg:#f3f6f5; --card:#ffffff; --warn:#b45309; --warn-soft:#fdf0db;
  --good:#15803d; --shadow:0 1px 2px rgba(16,40,47,.06),0 4px 16px rgba(16,40,47,.06);
  --radius:14px; --radius-sm:9px;
  --sans:'Segoe UI',Roboto,-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);color:var(--ink);background:var(--bg);line-height:1.5;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{margin:0 0 .4em;line-height:1.2;font-weight:650}
h1{font-size:1.45rem} h2{font-size:1.18rem} h3{font-size:1rem} h4{font-size:.85rem}
p{margin:0 0 .7em}
a{color:var(--accent)}
small{color:var(--muted)}
button{font-family:inherit;cursor:pointer}

/* ---------- Layout ---------- */
header.app{position:sticky;top:0;z-index:50;background:linear-gradient(110deg,#0f3a32,#15564a);color:#fff;box-shadow:var(--shadow)}
.bar{max-width:1180px;margin:0 auto;padding:.7rem 1.1rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:.6rem;font-weight:700;font-size:1.05rem;letter-spacing:.2px}
.brand .dot{width:26px;height:26px;border-radius:7px;background:conic-gradient(var(--forest) 0 40%,var(--house) 0 65%,var(--waste) 0 100%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.35)}
nav.tabs{display:flex;gap:.25rem;margin-left:auto;flex-wrap:wrap}
nav.tabs button{background:rgba(255,255,255,.08);color:#eafaf5;border:0;padding:.5rem .85rem;border-radius:999px;font-size:.86rem;font-weight:600;display:flex;align-items:center;gap:.4rem;transition:.15s}
nav.tabs button:hover{background:rgba(255,255,255,.2)}
nav.tabs button.active{background:#fff;color:var(--accent)}
.context-chip{font-size:.78rem;background:rgba(255,255,255,.12);padding:.3rem .6rem;border-radius:999px;color:#dff7f0}
main{max-width:1180px;margin:0 auto;padding:1.2rem 1.1rem 4rem}
section.view{display:none;animation:fade .2s ease}
section.view.active{display:block}
@keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:1.1rem 1.2rem;box-shadow:var(--shadow);margin-bottom:1.1rem}
.grid{display:grid;gap:1.1rem}
.grid>*{min-width:0}              /* let .scroll tables/charts clip instead of stretching the page */
.g2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.g3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.g4{grid-template-columns:repeat(auto-fit,minmax(170px,1fr))}
.row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:center}
.spread{justify-content:space-between}
.muted{color:var(--muted)}
.eyebrow{text-transform:uppercase;letter-spacing:.08em;font-size:.7rem;font-weight:700;color:var(--accent)}
.divider{height:1px;background:var(--line);margin:1rem 0}

/* ---------- Buttons ---------- */
.btn{border:1px solid var(--line);background:#fff;color:var(--ink);padding:.55rem .9rem;border-radius:var(--radius-sm);font-weight:600;font-size:.88rem;transition:.15s;display:inline-flex;align-items:center;gap:.45rem}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#0c5f59;color:#fff}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--waste)}
.btn.sm{padding:.35rem .6rem;font-size:.8rem}
.btn.block{width:100%;justify-content:center}
.btn[disabled]{opacity:.45;cursor:not-allowed}

/* ---------- Forms ---------- */
label.field{display:block;font-size:.78rem;font-weight:600;color:var(--muted);margin:.5rem 0 .2rem}
input[type=text],input[type=date],input[type=number],select,textarea{
  width:100%;padding:.55rem .65rem;border:1px solid var(--line);border-radius:var(--radius-sm);font-family:inherit;font-size:.92rem;background:#fff;color:var(--ink)}
input:focus,select:focus,textarea:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
textarea{resize:vertical;min-height:54px}

/* steppers */
.stepper{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;overflow:hidden;flex-shrink:0}
.stepper button{border:0;background:#f6f8f8;width:30px;height:30px;font-size:1.1rem;font-weight:700;color:var(--accent)}
.stepper button:hover{background:var(--accent-soft)}
.stepper .val{min-width:30px;text-align:center;font-weight:700;font-size:.95rem}

/* ---------- Token chips / pills ---------- */
.tok{display:inline-flex;align-items:center;gap:.35rem;font-weight:700;font-size:.8rem;padding:.18rem .55rem;border-radius:999px}
.tok.forest{background:var(--forest-soft);color:var(--forest)}
.tok.house{background:var(--house-soft);color:var(--house)}
.tok.resource{background:var(--resource-soft);color:var(--resource)}
.tok.waste{background:var(--waste-soft);color:var(--waste)}
.sw{width:11px;height:11px;border-radius:3px;display:inline-block}
.sw.forest{background:var(--forest)} .sw.house{background:var(--house)} .sw.resource{background:var(--resource)} .sw.waste{background:var(--waste)}

.tag{display:inline-block;font-size:.72rem;font-weight:700;padding:.18rem .5rem;border-radius:6px;background:var(--accent-soft);color:var(--accent)}
.tag.warn{background:var(--warn-soft);color:var(--warn)}
.tag.good{background:#e4f5e9;color:var(--good)}
.tag.bad{background:var(--waste-soft);color:var(--waste)}

/* ---------- Accordion (Learn) ---------- */
.acc{border:1px solid var(--line);border-radius:var(--radius-sm);margin-bottom:.6rem;overflow:hidden;background:#fff}
.acc>summary{padding:.8rem 1rem;font-weight:650;cursor:pointer;list-style:none;display:flex;align-items:center;gap:.6rem}
.acc>summary::-webkit-details-marker{display:none}
.acc>summary::after{content:'＋';margin-left:auto;color:var(--accent);font-weight:700}
.acc[open]>summary::after{content:'－'}
.acc .body{padding:0 1rem 1rem;border-top:1px solid var(--line)}
.acc .body{padding-top:.8rem}

/* ---------- Observe ---------- */
.seg{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
.seg button{border:0;background:transparent;padding:.45rem .85rem;font-weight:650;font-size:.85rem;color:var(--muted)}
.seg button.active{background:var(--accent);color:#fff}
.rounddots{display:flex;gap:.35rem;flex-wrap:wrap}
.rdot{width:34px;height:34px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:700;color:var(--muted);display:flex;align-items:center;justify-content:center}
.rdot.active{border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft)}
.rdot.done{background:var(--accent);color:#fff;border-color:var(--accent)}
.rdot.closed{background:#0f3a32;color:#fff;border-color:#0f3a32}

.teamcard{border:1px solid var(--line);border-radius:var(--radius-sm);padding:.7rem .8rem;background:#fff}
.teamcard.logged{border-color:var(--forest);background:linear-gradient(0deg,var(--forest-soft),#fff)}
.actiongrid{display:grid;grid-template-columns:repeat(2,1fr);gap:.45rem;margin:.5rem 0}
.act{border:1.5px solid var(--line);border-radius:var(--radius-sm);background:#fff;padding:.55rem;text-align:left;font-weight:650;font-size:.82rem;display:flex;flex-direction:column;gap:.15rem}
.act small{font-size:.68rem;font-weight:500}
.act:hover{border-color:var(--accent)}
.act.sel{border-color:var(--accent);background:var(--accent-soft);color:var(--accent)}
.act.bs{} .act.bl{} .act.rn{} .act.rw{}
.chip{border:1px solid var(--line);background:#fff;border-radius:999px;padding:.32rem .6rem;font-size:.76rem;font-weight:600;color:var(--muted);display:inline-flex;align-items:center;gap:.3rem}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.lev{border:1px solid var(--line);background:#fff;border-radius:999px;padding:.32rem .7rem;font-size:.76rem;font-weight:700}
.lev.shallow.on{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
.lev.deep.on{background:#e4f5e9;border-color:var(--good);color:var(--good)}

/* board grid (mirrors the 36-hex island) */
.hexgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px;max-width:300px}
.cell{aspect-ratio:1;border-radius:6px;background:#eee}
.cell.free{background:var(--forest-soft);box-shadow:inset 0 0 0 1.5px var(--forest)}
.boardbar{height:22px;border-radius:6px;overflow:hidden;display:flex;border:1px solid var(--line)}
.boardbar div{height:100%}
/* entry steps */
.step{font-size:.78rem;font-weight:700;color:var(--accent);margin:.7rem 0 .15rem}
.ctx{display:flex;flex-direction:column;gap:.4rem;margin:.3rem 0}
.ctxrow{display:flex;align-items:center;justify-content:space-between;gap:.6rem;border:1px solid var(--line);border-radius:var(--radius-sm);padding:.45rem .6rem}
.ctxrow>div:first-child{min-width:0}
.ctxrow strong{font-size:.86rem;font-weight:600}

/* ---------- Metric cards ---------- */
.metric{border:1px solid var(--line);border-radius:var(--radius);padding:.9rem 1rem;background:#fff;position:relative}
.metric .v{font-size:1.7rem;font-weight:750;line-height:1}
.metric .lab{font-size:.8rem;font-weight:650;color:var(--muted);margin-top:.2rem}
.metric .delta{font-size:.74rem;font-weight:700;margin-top:.35rem}
.metric .help{position:absolute;top:.7rem;right:.8rem;width:20px;height:20px;border-radius:50%;background:var(--accent-soft);color:var(--accent);font-size:.72rem;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;outline:none}
.help .tip{position:absolute;right:-2px;top:150%;width:240px;max-width:62vw;background:#16282f;color:#fff;font-weight:500;font-size:.76rem;line-height:1.45;padding:.6rem .7rem;border-radius:9px;box-shadow:0 8px 26px rgba(16,40,47,.28);opacity:0;visibility:hidden;transform:translateY(-4px);transition:.14s;z-index:90;text-align:left;pointer-events:none}
.help:hover .tip,.help:focus .tip,.help:focus-within .tip{opacity:1;visibility:visible;transform:none}
.help .tip::after{content:'';position:absolute;right:6px;top:-5px;border:6px solid transparent;border-bottom-color:#16282f;border-top:0}
.up{color:var(--good)} .down{color:var(--waste)}

/* tables */
table{width:100%;border-collapse:collapse;font-size:.82rem}
th,td{text-align:left;padding:.45rem .55rem;border-bottom:1px solid var(--line)}
th{color:var(--muted);font-weight:650;font-size:.74rem;text-transform:uppercase;letter-spacing:.04em}
tbody tr:hover{background:#fafcfb}
.scroll{overflow:auto}

/* recommendations */
.rec{border-left:4px solid var(--accent);background:var(--accent-soft);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:.7rem .9rem;margin-bottom:.6rem}
.rec.warn{border-color:var(--warn);background:var(--warn-soft)}
.rec.good{border-color:var(--good);background:#e4f5e9}
.rec h4{margin:0 0 .2rem}
.rec p{margin:0;font-size:.86rem}

.empty{text-align:center;padding:2.5rem 1rem;color:var(--muted)}
.empty .big{font-size:2.2rem;margin-bottom:.4rem}
.toast{position:fixed;bottom:1rem;left:50%;transform:translateX(-50%);background:#16282f;color:#fff;padding:.6rem 1rem;border-radius:999px;font-size:.85rem;font-weight:600;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:.25s;z-index:200}
.toast.show{opacity:1}

/* legend */
.legend{display:flex;gap:.9rem;flex-wrap:wrap;font-size:.78rem;color:var(--muted)}
.legend span{display:inline-flex;align-items:center;gap:.35rem}

/* ---------- Play (the live demo game) ---------- */
.hx{stroke:#fff;stroke-width:2;cursor:default;transition:fill .12s}
.hx.forest{fill:var(--forest-soft)}
.hx.small,.hx.large{fill:var(--house)}
.hx.r1{fill:#90a4ae}.hx.r3{fill:var(--resource)}
.hx.waste{fill:var(--waste)}
.hx.hot{cursor:pointer;stroke:var(--accent);stroke-width:2.5;stroke-dasharray:5 3}
.hx.hot:hover{fill:var(--accent-soft)}
.hx.sel{stroke:var(--ink);stroke-width:3.5;stroke-dasharray:none}
.turnhead{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;padding:.5rem .7rem;border-radius:var(--radius-sm);background:var(--accent-soft);margin-bottom:.5rem}
.turnhead strong{font-size:1rem}
.handtok{display:inline-flex;align-items:center;gap:.3rem;font-weight:800;font-size:.78rem;padding:.2rem .55rem;border-radius:999px;background:var(--resource-soft);color:var(--resource);border:1px solid var(--line)}
.handtok.r3{background:#dfe7ea;color:#37474f}
.supplyrow{display:flex;gap:.4rem;flex-wrap:wrap;font-size:.74rem}
.supplyrow .tok{font-size:.72rem}
.playhint{border:1.5px dashed var(--accent);background:#f4fbf9;border-radius:var(--radius-sm);padding:.5rem .7rem;font-size:.82rem;margin:.4rem 0}

.appfoot{margin-top:1.5rem;padding:1.2rem 0 0;border-top:1px solid var(--line);text-align:center;color:var(--muted);font-size:.82rem}
.appfoot p{margin:0 0 .3rem}
.appfoot a{color:var(--accent);font-weight:600;text-decoration:none}
.appfoot a:hover{text-decoration:underline}
.appfoot .dotsep{margin:0 .4rem;opacity:.5}
@media(max-width:560px){
  .bar{padding:.55rem .7rem;gap:.5rem}
  .brand{font-size:.95rem}
  .context-chip{display:none}            /* the workshop name already shows on each screen */
  nav.tabs{width:100%;margin-left:0;justify-content:center;gap:.35rem}
  nav.tabs button{padding:.5rem .75rem;font-size:.82rem;white-space:nowrap}
  main{padding:.9rem .7rem 3rem}
  .card{padding:.9rem .85rem}
  .act{padding:.6rem .55rem;min-height:52px}    /* keep build buttons 2-up but tappable */
  .stepper button{width:38px;height:38px}        /* bigger +/- targets for thumbs */
  .chip,.lev{padding:.45rem .7rem}                /* easier taps */
  .ctxrow{padding:.55rem .6rem}
}
</style>
</head>
<body>

<header class="app">
  <div class="bar">
    <div class="brand"><span class="dot"></span> Tipping Point — Observatory</div>
    <span class="context-chip" id="ctxChip">No workshop selected</span>
    <nav class="tabs" id="tabs">
      <button data-tab="home" class="active">🏠 Home</button>
      <button data-tab="learn">📖 Explain</button>
      <button data-tab="play">🎲 Play</button>
      <button data-tab="observe">🔭 Observe</button>
      <button data-tab="insights">📊 Insights</button>
      <button data-tab="data">🗂️ Data</button>
    </nav>
  </div>
</header>

<main>
  <!-- ============== HOME ============== -->
  <section class="view active" id="view-home"></section>
  <!-- ============== LEARN ============== -->
  <section class="view" id="view-learn"></section>
  <!-- ============== PLAY ============== -->
  <section class="view" id="view-play"></section>
  <!-- ============== OBSERVE ============== -->
  <section class="view" id="view-observe"></section>
  <!-- ============== INSIGHTS ============== -->
  <section class="view" id="view-insights"></section>
  <!-- ============== DATA ============== -->
  <section class="view" id="view-data"></section>

  <footer class="appfoot">
    <p>Tipping Point is a research game by Thomas-Julian Irabor and colleagues at the University of Liège.</p>
    <p>
      <a href="https://www.nature.com/articles/s41599-025-04990-x" target="_blank" rel="noopener">Read the study</a>
      — Irabor et al. (2025), <em>Humanities and Social Sciences Communications</em>.
      <span class="dotsep">·</span>
      <a href="https://www.linkedin.com/in/irabor/" target="_blank" rel="noopener">Get in touch on LinkedIn</a>.
    </p>
  </footer>
</main>

<div class="toast" id="toast"></div>

<script>
/* =====================================================================
   STATE
   ===================================================================== */
const KEY='tippingPointObservatory_v1';
const ACTIONS={
  build_small:{label:'Build · small house',short:'Small house',pts:1,waste:1,cls:'bs',icon:'🏠',
    cost:'1 R1',gain:'+1 pt',note:'1 R1 · +1 pt · +1 waste/turn'},
  build_large:{label:'Build · large house',short:'Large house',pts:2,waste:2,cls:'bl',icon:'🏰',
    cost:'1 R3',gain:'+2 pt',note:'1 R3 (or 2 R1) · +2 pt · +2 waste/turn'},
  renovate:{label:'Renovate large → small',short:'Renovate',pts:1,waste:0,cls:'rn',icon:'🔧',
    cost:'1 resource',gain:'+1 pt',note:'1 resource · +1 pt · −1 waste/turn'},
  remove_waste:{label:'Remove waste (manual)',short:'Remove waste',pts:1,waste:0,cls:'rw',icon:'🧹',
    cost:'1 R3 each',gain:'+1 pt',note:'1 R3 per waste · +1 pt each'}
};
const SYSTEM_CARE=['renovate','remove_waste'];   // long-term / regenerative
const EXPANSION=['build_small','build_large'];     // immediate-gain

let S=load();
function load(){
  try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.workshops)return s;}catch(e){}
  return {workshops:[],currentId:null,ui:{tab:'home',session:1,round:1,program:''}};
}
function save(){localStorage.setItem(KEY,JSON.stringify(S));}
function uid(){return Math.random().toString(36).slice(2,9);}
function cur(){return S.workshops.find(w=>w.id===S.currentId)||null;}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1900);}

/* default new workshop */
function newWorkshop(d){
  const teams=(d.teamNames||['Team 1','Team 2','Team 3','Team 4'])
      .filter(n=>n.trim()).map(n=>({id:uid(),name:n.trim()}));
  const sessions={};
  for(let s=1;s<=(d.numSessions||3);s++){
    sessions[s]={num:s,rounds:{},outcome:{result:'',collapseRound:null,winner:'',notes:''}};
    for(let r=1;r<=(d.numRounds||6);r++){
      sessions[s].rounds[r]={num:r,closed:false,
        board:{green:36,small:0,large:0,waste:0},
        wasteAdded:0,biodegrade:0,actions:[]};
    }
  }
  return {id:uid(),name:d.name||'Untitled workshop',program:d.program||'',facilitator:d.facilitator||'',
          date:d.date||new Date().toISOString().slice(0,10),notes:'',
          numSessions:d.numSessions||3,numRounds:d.numRounds||6,teams,sessions};
}

/* =====================================================================
   NAV
   ===================================================================== */
document.getElementById('tabs').addEventListener('click',e=>{
  const b=e.target.closest('button[data-tab]');if(!b)return;go(b.dataset.tab);
});
function go(tab){
  S.ui.tab=tab;save();
  document.querySelectorAll('nav.tabs button').forEach(x=>x.classList.toggle('active',x.dataset.tab===tab));
  document.querySelectorAll('section.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  render(tab);
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(tab){
  ({home:renderHome,learn:renderLearn,play:renderPlay,observe:renderObserve,insights:renderInsights,data:renderData}[tab])();
  const w=cur();
  document.getElementById('ctxChip').textContent=w?`${w.name}${w.program?' · '+w.program:''}`:'No workshop selected';
}

/* =====================================================================
   HOME
   ===================================================================== */
function renderHome(){
  const v=document.getElementById('view-home');
  const list=S.workshops.map(w=>{
    const st=workshopStats(w);
    return `<div class="card" style="margin-bottom:.7rem">
      <div class="row spread">
        <div>
          <div class="row" style="gap:.5rem"><strong>${esc(w.name)}</strong>
            ${w.id===S.currentId?'<span class="tag good">active</span>':''}</div>
          <small>${esc(w.program||'—')} · ${w.teams.length} teams · ${w.numSessions} sessions · ${st.actions} actions logged · ${esc(w.date)}</small>
        </div>
        <div class="row">
          <button class="btn sm" onclick="selectWorkshop('${w.id}')">Open</button>
          <button class="btn sm ghost" onclick="delWorkshop('${w.id}')">Delete</button>
        </div>
      </div></div>`;
  }).join('')||`<div class="empty"><div class="big">🏝️</div>No workshops yet. Create one below to start logging play.</div>`;

  v.innerHTML=`
  <div class="card" style="background:linear-gradient(110deg,#eafaf5,#fff)">
    <span class="eyebrow">Facilitator workspace</span>
    <h1>Record how teams play Tipping Point. Read what their actions show.</h1>
    <p class="muted" style="max-width:800px">Log each team's action while you watch. The tool keeps the running totals: waste on the board, the waste the forest clears each round, and each team's score. It turns the actions into four plain measures: how far ahead teams plan, how much they work together, how big a change they make to their approach, and how often they think before acting. It writes short notes on what the numbers show. It saves everything as a spreadsheet.</p>
    <div class="legend" style="margin-top:.6rem">
      <span><i class="sw forest"></i> forest / land</span>
      <span><i class="sw house"></i> houses</span>
      <span><i class="sw resource"></i> resources</span>
      <span><i class="sw waste"></i> waste</span>
    </div>
  </div>

  <div class="grid g2">
    <div class="card">
      <h2>➕ New workshop / group</h2>
      <p class="muted" style="font-size:.85rem">One workshop holds one group of players across all their sessions. The more workshops you record, the clearer the shared patterns become.</p>
      <label class="field">Workshop name</label>
      <input type="text" id="nwName" placeholder="e.g. IManHR cohort — Oct 2026">

function createWorkshop(){
  const name=val('nwName')||'Untitled workshop';
  const w=newWorkshop({
    name,program:val('nwProg'),facilitator:val('nwFac'),date:val('nwDate'),
    numSessions:+val('nwSess')||3,numRounds:+val('nwRounds')||6,
    teamNames:val('nwTeams').split('\n')
  });
  S.workshops.push(w);S.currentId=w.id;S.ui.session=1;S.ui.round=1;save();
  toast('Workshop created');go('observe');
}
function selectWorkshop(id){S.currentId=id;S.ui.session=1;S.ui.round=1;save();toast('Workshop opened');go('observe');}
function delWorkshop(id){if(!confirm('Delete this workshop and all its data?'))return;
  S.workshops=S.workshops.filter(w=>w.id!==id);if(S.currentId===id)S.currentId=S.workshops[0]?.id||null;save();renderHome();}

let entryDraft=null; // {teamId,action,...}
function renderObserve(){
  const v=document.getElementById('view-observe');const w=cur();
  if(!w){v.innerHTML=noWorkshop();return;}
  const sNum=S.ui.session,rNum=S.ui.round;
  const sess=w.sessions[sNum];const rd=sess.rounds[rNum];
  const board=liveBoard(w,sNum,rNum); // board state entering this round
  const bg=boardGrid(board);

  // session + round selectors
  const sessSeg=Object.keys(w.sessions).map(n=>`<button class="${+n===sNum?'active':''}" onclick="setSession(${n})">Session ${n}</button>`).join('');
  const roundDots=Object.values(sess.rounds).map(r=>{
    let cls='rdot';if(r.num===rNum)cls+=' active';if(r.closed)cls+=' closed';else if(r.actions.length)cls+=' done';
    return `<div class="${cls}" onclick="setRound(${r.num})" title="Round ${r.num}">${r.num}</div>`;}).join('');

  const occupied=36-board.green;const pct=Math.round(occupied/36*100);
  const collapse=board.green<=0;

  // team cards
  const teams=w.teams.map(t=>{
    const logged=rd.actions.find(a=>a.teamId===t.id);
    if(entryDraft&&entryDraft.teamId===t.id&&!rd.closed) return entryPanel(t,w);
    const held=resourcesHeld(w,sNum,rNum,t.id,true);
    return `<div class="teamcard ${logged?'logged':''}">
      <div class="row spread">
        <strong>${esc(t.name)}</strong>
        <span class="tok resource"><i class="sw resource"></i>${held} held</span>
      </div>
      ${logged?`<div class="row" style="margin-top:.4rem;gap:.4rem">
          <span class="tag">${ACTIONS[logged.action].icon} ${ACTIONS[logged.action].short}</span>
          ${flagTags(logged)}
        </div>
        <div class="row" style="margin-top:.45rem">
          ${rd.closed?'':`<button class="btn sm" onclick="editEntry('${t.id}')">Edit</button>`}
        </div>`
       :(rd.closed?'<small class="muted">no action logged</small>'
         :`<button class="btn primary sm block" style="margin-top:.5rem" onclick="startEntry('${t.id}')">＋ Log action</button>`)}
    </div>`;
  }).join('');

  const allLogged=w.teams.every(t=>rd.actions.find(a=>a.teamId===t.id));

  v.innerHTML=`
  <div class="card">
    <div class="row spread">
      <div><span class="eyebrow">Observing</span><h1 style="margin:0">${esc(w.name)}</h1></div>
      <div class="seg">${sessSeg}</div>
    </div>
    <div class="divider"></div>
    <div class="row spread">
      <div>
        <small class="muted">Round</small>
        <div class="rounddots" style="margin-top:.25rem">${roundDots}</div>
      </div>
      <div class="row">
        ${rd.closed?`<span class="tag good">round closed</span>
            <button class="btn sm" onclick="reopenRound()">Reopen</button>`
          :`<button class="btn primary" ${allLogged?'':'disabled'} onclick="closeRound()">
              Close round ${rNum} → add waste &amp; run forest clean-up ▶</button>`}
      </div>
    </div>
    <div class="row" style="gap:.4rem;margin-top:.7rem;flex-wrap:wrap">
      <span class="tag ${pct>80?'bad':pct>55?'warn':'good'}">${pct}% full</span>
      <span class="tok forest"><i class="sw forest" style="background:var(--forest-soft);box-shadow:inset 0 0 0 1.5px var(--forest)"></i> ${board.green} free</span>
      <span class="tok house"><i class="sw house"></i> ${board.small+board.large}</span>
      <span class="tok resource"><i class="sw resource"></i> ${board.resTokens}</span>
      <span class="tok waste"><i class="sw waste"></i> ${board.waste}</span>
      ${bg.over>0?`<span class="tag bad">⚠ ${bg.over} over</span>`:''}
    </div>
  </div>

  <div class="grid g2">
    <div class="card">
      <div class="row spread"><h3>Teams this round</h3><small class="muted">${rd.actions.length}/${w.teams.length} logged</small></div>
      <div class="grid" style="grid-template-columns:1fr;gap:.6rem;margin-top:.5rem">${teams}</div>
    </div>

    <div class="card">
      <h3>Board entering round ${rNum}</h3>
      <div class="hexgrid" style="margin:.5rem 0">${bg.html}</div>
      ${bg.over>0?`<span class="tag bad">⚠ ${bg.over} over capacity — island overfull</span>`:''}
      <div class="legend" style="margin-top:.5rem">
        <span><i class="sw forest" style="background:var(--forest-soft);box-shadow:inset 0 0 0 1.5px var(--forest)"></i> ${board.green} forest free</span>
        <span><i class="sw house"></i> ${board.small+board.large} houses (${board.small}S/${board.large}L)</span>
        <span><i class="sw resource"></i> ${board.resTokens} resources</span>
        <span><i class="sw waste"></i> ${board.waste} waste</span>
      </div>
      <div class="divider"></div>
      <div class="row spread">
        <div><div class="metric" style="border:0;padding:0"><div class="v" style="color:${pct>80?'var(--waste)':pct>55?'var(--warn)':'var(--good)'}">${pct}%</div><div class="lab">island occupied</div></div></div>
        <div style="text-align:right">
          <small class="muted">next forest clean-up will clear</small><br>
          <strong>${Math.floor(board.green/2)} waste</strong> <small class="muted">(⌊${board.green}/2⌋)</small>
        </div>
      </div>
      ${collapse?'<div class="rec warn" style="margin-top:.6rem"><h4>⚠ Island is full</h4><p>If this happened before the final round, mark a collective collapse in the session outcome below.</p></div>':''}
      <p class="muted" style="font-size:.78rem;margin-top:.6rem">The tool works out the board from the actions you logged and the forest clean-up. Set the free-forest count by hand if the real board differs.
        <button class="btn sm ghost" onclick="overrideGreen()">adjust forest count</button></p>
    </div>
  </div>

  <div class="card">
    <h3>Session ${sNum} outcome</h3>
    <p class="muted" style="font-size:.83rem">Record this after the last round. The change-across-sessions chart uses it.</p>
    <div class="grid g3" style="gap:.6rem">
      <div><label class="field">Result</label>
        <select onchange="setOutcome('result',this.value)">
          <option value="">—</option>
          <option ${sess.outcome.result==='survived'?'selected':''} value="survived">Survived to the end</option>
          <option ${sess.outcome.result==='win'?'selected':''} value="win">Survived — clear winner</option>
          <option ${sess.outcome.result==='collapse'?'selected':''} value="collapse">Everyone lost (board filled)</option>
        </select></div>
      <div><label class="field">Collapse round (if any)</label>
        <input type="number" min="1" max="${w.numRounds}" value="${sess.outcome.collapseRound||''}" onchange="setOutcome('collapseRound',this.value)"></div>
      <div><label class="field">Winning team</label>
        <select onchange="setOutcome('winner',this.value)"><option value="">—</option>
          ${w.teams.map(t=>`<option ${sess.outcome.winner===t.id?'selected':''} value="${t.id}">${esc(t.name)}</option>`).join('')}</select></div>
    </div>
    <label class="field">Debrief notes (facilitator)</label>
    <textarea onchange="setOutcome('notes',this.value)" placeholder="Memorable moments, quotes, turning points…">${esc(sess.outcome.notes||'')}</textarea>
  </div>`;
}

function entryPanel(t,w){

  const isBuild=a==='build_small'||a==='build_large';
  return `<div class="teamcard logged">
    <div class="row spread"><strong>${esc(t.name)}</strong>

    <div class="actiongrid">
      ${Object.entries(ACTIONS).map(([k,act])=>`<button class="act ${act.cls} ${a===k?'sel':''}" onclick="draftSet('action','${k}')">
        <span>${act.icon} ${act.short}</span><small>${act.cost} · ${act.gain}</small></button>`).join('')}
    </div>
    ${a?`
    ${paidWithToggle(d)}

    <div class="step">2 · Quick context <span class="muted" style="font-weight:400">— only what you saw</span></div>
    <div class="ctx">
      ${isBuild?ctxRow('🔗','Houses it touched → resources earned','any house counts, the builder\'s own or not: +1 token per house touched','connections'):''}
      ${isBuild?ctxRow('🏘','Of those, another team\'s houses','building beside a rival still pays — worth seeing','touchedOther'):''}
      ${a==='remove_waste'?ctxRow('🧹','Waste tokens removed','+1 point each','wasteRemoved'):''}
      ${ctxRow('🤝','Gave resources to another team','a cooperation action','sharedGiven')}

    </div>
    ${a==='renovate'?`<div class="row" style="gap:.35rem;margin:.2rem 0">

    </div>`:''}

    <div class="step">3 · Behaviour you observed</div>
    <div class="row" style="gap:.35rem;margin:.35rem 0">
      <button class="chip ${d.crosstalk?'on':''}" onclick="draftToggle('crosstalk')">💬 talked to another team</button>
      <button class="chip ${d.statedGoal?'on':''}" onclick="draftToggle('statedGoal')">🎯 named a shared goal</button>
      <button class="chip ${d.anticipated?'on':''}" onclick="draftToggle('anticipated')">🔮 thought ahead before acting</button>
    </div>

    <div class="step">4 · How big a change they made <span class="muted" style="font-weight:400">— optional</span></div>
    <div class="row" style="gap:.35rem;margin:.35rem 0">
      <button class="lev shallow ${d.leverage==='shallow'?'on':''}" onclick="draftLev('shallow')">⚙️ small tweak — house size or place</button>
      <button class="lev deep ${d.leverage==='deep'?'on':''}" onclick="draftLev('deep')">🌱 big change — a rule or the goal</button>
    </div>

    <p class="muted" style="font-size:.74rem;margin:.3rem 0 0">💡 Tokens paid for a build or renovation sit beside the house, where the team chose to put them. "From board" means the team built next to spare value already lying there — a renovation payment keeps its full value, an overpaid R3 keeps the difference. Spare value only serves a house built beside it.</p>

    <input type="text" id="d_notes" placeholder="optional note or quote…" value="${esc(d.notes||'')}" style="margin:.3rem 0">
    <button class="btn primary block" onclick="saveEntry()">✓ Save ${esc(t.name)}'s turn</button>
    `:'<p class="muted" style="font-size:.82rem;margin-top:.4rem">Pick the action above to continue.</p>'}

function ctxRow(icon,label,help,field){
  return `<div class="ctxrow"><div><span style="font-size:1.05rem">${icon}</span> <strong>${label}</strong>${help?`<br><small class="muted">${help}</small>`:''}</div>${stepper(field)}</div>`;
}
function stepper(field){const v=entryDraft[field]||0;
  return `<span class="stepper"><button type="button" onclick="draftStep('${field}',-1)">−</button><span class="val" id="step_${field}">${v}</span><button type="button" onclick="draftStep('${field}',1)">+</button></span>`;}

function startEntry(tid){entryDraft={teamId:tid,action:'',spentR1:0,spentR3:0,fromBoard:0,connections:0,touchedOther:0,renovatedOther:false,wastePayMode:'r3',wasteRemoved:0,sharedGiven:0,sharedReceived:0,crosstalk:false,statedGoal:false,anticipated:false,leverage:null,notes:''};renderObserve();}
function editEntry(tid){const rd=cur().sessions[S.ui.session].rounds[S.ui.round];const a=rd.actions.find(x=>x.teamId===tid);entryDraft={...a};renderObserve();}
function cancelEntry(){entryDraft=null;renderObserve();}
// keep transient inputs (notes) from being lost when we re-render the panel
function syncDraftInputs(){if(!entryDraft)return;const n=document.getElementById('d_notes');if(n)entryDraft.notes=n.value;}
// re-render the Observe view without losing scroll position
function rerenderObserve(){const y=window.scrollY;renderObserve();window.scrollTo(0,y);}
function draftSet(f,v){syncDraftInputs();entryDraft[f]=v;
  if(f==='action'){const a=v;entryDraft.fromBoard=0;
    if(a==='build_large'){entryDraft.spentR3=1;entryDraft.spentR1=0;}        // most build H2 with R3
    else if(a==='build_small'||a==='renovate'){entryDraft.spentR1=1;entryDraft.spentR3=0;}
    else if(a==='remove_waste'){entryDraft.spentR3=1;entryDraft.spentR1=0;if(!entryDraft.wasteRemoved)entryDraft.wasteRemoved=1;if(!entryDraft.wastePayMode)entryDraft.wastePayMode='r3';}
    if(!(a==='build_small'||a==='build_large')){entryDraft.connections=0;entryDraft.touchedOther=0;}
    if(a!=='renovate')entryDraft.renovatedOther=false;
  }
  rerenderObserve();}
// how a team paid. format: [label, handR1, handR3, fromBoard, tag]
// handR1/handR3 = own tokens placed on the board; fromBoard = value taken from the free pool.
// A team can mix the two (take what's free, top up from hand).
const PAID_OPTIONS={
  build_small:[['1 R1',1,0,0,'usual'],['1 R3',0,1,0,''],['from board',0,0,1,'free']],
  build_large:[['1 R3',0,1,0,'usual'],['2 R1',2,0,0,''],['1 board + 1 R1',1,0,1,''],['2 from board',0,0,2,'free']],
  renovate:[['1 R1',1,0,0,'usual'],['1 R3',0,1,0,'']]   // renovation is paid from hand only
};
const VALUE_NEEDED={build_small:1,build_large:2,renovate:1,remove_waste:0};
function paidWithToggle(d){

    return `<div class="row" style="gap:.4rem;margin:.3rem 0 .2rem;align-items:center;flex-wrap:wrap">

}
function setPaid(r1,r3,fromBoard){syncDraftInputs();entryDraft.spentR1=r1;entryDraft.spentR3=r3;entryDraft.fromBoard=fromBoard||0;rerenderObserve();}
function setWastePay(m){syncDraftInputs();entryDraft.wastePayMode=m;rerenderObserve();}
function normalizeSpend(d){
  if(d.action==='remove_waste'){const n=Math.max(1,d.wasteRemoved||1);
    if(d.wastePayMode==='r1'){d.spentR1=3*n;d.spentR3=0;}else{d.spentR3=n;d.spentR1=0;}
    d.fromBoard=0;}
  // builds and renovate keep the "paid with" choice the facilitator picked
  d.touchedOther=Math.min(d.touchedOther||0,d.connections||0);

}
function draftStep(f,n){entryDraft[f]=Math.max(0,(entryDraft[f]||0)+n);

function setSession(n){S.ui.session=n;S.ui.round=1;entryDraft=null;save();renderObserve();}
function setRound(n){S.ui.round=n;entryDraft=null;save();renderObserve();}
function setOutcome(f,v){const o=cur().sessions[S.ui.session].outcome;o[f]=(f==='collapseRound')?(+v||null):v;save();}
function closeRound(){const rd=cur().sessions[S.ui.session].rounds[S.ui.round];rd.closed=true;entryDraft=null;save();
  toast('Round closed — waste added and forest clean-up applied');
  if(S.ui.round<cur().numRounds)S.ui.round++;renderObserve();}

function overrideGreen(){

/* board simulation: state ENTERING round r of session s */
function liveBoard(w,s,r){
  let small=0,large=0,waste=0,resTokens=0;
  for(let rr=1;rr<r;rr++){
    const rd=w.sessions[s].rounds[rr];
    // apply actions
    rd.actions.forEach(a=>{
      const placed=(a.spentR1||0)+(a.spentR3||0); // tokens paid with go on the board
      if(a.action==='build_small'){small++;resTokens+=placed;}
      else if(a.action==='build_large'){large++;resTokens+=placed;}
      else if(a.action==='renovate'){if(large>0){large--;small++;}resTokens+=placed;} // the payment token stays on the board, its value freed
      else if(a.action==='remove_waste'){waste=Math.max(0,waste-(a.wasteRemoved||0));}
    });
    let green=36-(small+large+resTokens+waste);
    // biodegrade (not round 1)
    if(rr>1){const bio=Math.floor(Math.max(0,green)/2);waste=Math.max(0,waste-bio);}
    // waste phase
    waste+=small*1+large*2;
  }
  let green=36-(small+large+resTokens+waste);
  const rd=w.sessions[s].rounds[r];
  if(rd.greenOverride!=null)green=rd.greenOverride;
  return {green:Math.max(0,green),small,large,waste:Math.max(0,waste),resTokens};
}
/* resources a team holds entering (or, if incl current, after) a round */
function resourcesHeld(w,s,r,tid,beforeCurrent){
  let h=2; // each team starts with 2 random resource tokens
  for(let rr=1;rr<=r;rr++){
    if(rr===r&&beforeCurrent)break;
    const a=w.sessions[s].rounds[rr].actions.find(x=>x.teamId===tid);if(!a)continue;
    // gained: ONLY via houses touched (connections) or a share received
    h+=(a.connections||0)+(a.sharedReceived||0);
    // spent: tokens used on the action + any tokens given away
    h-=(a.spentR1||0)+(a.spentR3||0)+(a.sharedGiven||0);
  }
  return Math.max(0,h);
}
// value a team drew from the board (handles old data that used the fromPool flag)
function boardUse(a){return a.fromBoard!=null?a.fromBoard:(a.fromPool?(VALUE_NEEDED[a.action]||0):0);}
// value an action needs. Removing waste needs exactly 1 R3 per waste, so it can never overpay.
function valueNeeded(a){return a.action==='remove_waste'?3*(a.wasteRemoved||0):(VALUE_NEEDED[a.action]||0);}
// value a team left on the board this action (overpay surplus beyond what it still needed)
function surplusLeftBy(a){const need=Math.max(0,valueNeeded(a)-boardUse(a));return Math.max(0,((a.spentR1||0)+3*(a.spentR3||0))-need);}
function flagTags(a){let s='';if(a.sharedGiven||a.sharedReceived)s+='<span class="tag good">🤝</span>';if(a.crosstalk)s+='<span class="tag">💬</span>';if(a.statedGoal)s+='<span class="tag">🎯</span>';if(a.anticipated)s+='<span class="tag">🔮</span>';if(a.leverage==='deep')s+='<span class="tag good">🌱 big change</span>';if(a.leverage==='shallow')s+='<span class="tag warn">⚙️ small tweak</span>';
  const fb=boardUse(a);if(fb>0)s+=`<span class="tag good">♻️ ${fb} from board</span>`;
  if(a.action==='renovate'){const val=(a.spentR1||0)+3*(a.spentR3||0)||1;s+=`<span class="tag good">♻️ freed ${val}</span>`;
    if(a.renovatedOther)s+='<span class="tag good">🏚 another team’s</span>';}
  else{const sp=surplusLeftBy(a);if(sp>0)s+=`<span class="tag good">🪙 left ${sp}</span>`;}
  if((a.touchedOther||0)>0)s+=`<span class="tag good">🏘 +${a.touchedOther} other-team</span>`;
  return s;}
// shared pool of spare resources on the board.
// adds: overpaying a build, and renovating (frees 1). draws: paying part/all of an action from the board.
function computeSharedPool(w){
  let pool=0;const t={leftTotal:0,takenTotal:0,fundedCount:0,poolNow:0,perTeam:{},perSession:{}};
  w.teams.forEach(tm=>t.perTeam[tm.id]={left:0,taken:0});
  allActions(w).forEach(a=>{
    const need=VALUE_NEEDED[a.action]||0;
    const pt=t.perTeam[a.teamId]||(t.perTeam[a.teamId]={left:0,taken:0});
    const ps=t.perSession[a.session]||(t.perSession[a.session]={left:0,taken:0,funded:0});
    if(a.action==='renovate'){pool+=1;t.leftTotal+=1;pt.left+=1;ps.left+=1;}      // renovating frees a resource
    const want=boardUse(a);const drew=Math.min(want,pool);
    if(drew>0){pool-=drew;t.takenTotal+=drew;pt.taken+=drew;ps.taken+=drew;ps.funded++;t.fundedCount++;}
    const surplus=surplusLeftBy(a);                                               // overpay left for others
    if(surplus>0){pool+=surplus;t.leftTotal+=surplus;pt.left+=surplus;ps.left+=surplus;}
  });
  t.poolNow=Math.max(0,pool);return t;
}

/* ---- real statistics: sign test + Wilson interval, pooled across ALL workshops ----
   Tests whether each team rose from its first session to its last more often than chance. */
function logFact(n){let s=0;for(let i=2;i<=n;i++)s+=Math.log(i);return s;}
function signTestP(up,down){            // two-sided p, null = coin-flip (0.5)
  const n=up+down;if(n===0)return 1;const k=Math.max(up,down),ln2=Math.log(0.5);
  let tail=0;for(let i=k;i<=n;i++)tail+=Math.exp(logFact(n)-logFact(i)-logFact(n-i)+n*ln2);
  return Math.min(1,2*tail);
}
function wilson(up,n){if(!n)return[0,0];const z=1.96,p=up/n,d=1+z*z/n;
  const c=(p+z*z/(2*n))/d,h=z*Math.sqrt(p*(1-p)/n+z*z/(4*n*n))/d;
  return[Math.max(0,c-h),Math.min(1,c+h)];}
function teamSessionValue(w,tid,sNum,measure){
  const acts=allActions(w).filter(a=>a.teamId===tid&&a.session===sNum);
  if(!acts.length)return null;
  if(measure==='protect')return indicators(acts).TOI;
  if(measure==='together')return indicators(acts).CI;
  if(measure==='ahead')return indicators(acts).ANT;
  if(measure==='boardshare'){let s=0;acts.forEach(a=>{s+=surplusLeftBy(a)+(a.action==='renovate'?1:0);});return s;}
  return null;
}
function firstLastDeltas(measure){
  const d=[];
  S.workshops.forEach(w=>w.teams.forEach(t=>{
    const sess=Object.keys(w.sessions).map(Number).filter(s=>allActions(w).some(a=>a.session===s&&a.teamId===t.id));
    if(sess.length<2)return;
    const f=teamSessionValue(w,t.id,sess[0],measure),l=teamSessionValue(w,t.id,sess[sess.length-1],measure);
    if(f==null||l==null)return;d.push(l-f);
  }));return d;
}
function generalisation(measure){
  const d=firstLastDeltas(measure),e=1e-9;
  const up=d.filter(x=>x>e).length,down=d.filter(x=>x<-e).length;
  return {n:d.length,up,down,same:d.length-up-down,p:signTestP(up,down),ci:wilson(up,up+down)};
}
function survivalGeneralisation(){
  let up=0,down=0;
  S.workshops.forEach(w=>{const ss=Object.keys(w.sessions).map(Number).filter(s=>w.sessions[s].outcome.result);
    if(ss.length<2)return;const f=w.sessions[ss[0]].outcome.result!=='collapse',l=w.sessions[ss[ss.length-1]].outcome.result!=='collapse';
    if(f===l)return;if(!f&&l)up++;else down++;});
  return {n:up+down,up,down,p:signTestP(up,down)};
}
function statVerdict(g){const eff=g.up+g.down;
  if(eff<6)return['warn','Too few teams yet'];
  if(g.p<0.05)return['good','Likely real'];
  if(g.p<0.20)return['warn','Leaning that way'];
  return['bad','No clear pattern yet'];}
function barSeg(n,c){if(n<=0)return'';return `<div style="flex:${n};background:${c}"></div>`;}
function boardGrid(b){
  const map={lg:'var(--house)',sm:'#5b9bd5',res:'var(--resource)',waste:'var(--waste)'};
  let arr=[];const push=(n,k)=>{for(let i=0;i<n;i++)arr.push(k);};
  push(b.large,'lg');push(b.small,'sm');push(b.resTokens,'res');push(b.waste,'waste');
  const over=Math.max(0,arr.length-36);
  arr=arr.slice(0,36);
  const free=36-arr.length;for(let i=0;i<free;i++)arr.push('free');
  const html=arr.map(k=>k==='free'?'<div class="cell free"></div>':`<div class="cell" style="background:${map[k]}"></div>`).join('');
  return {html,over,free};
}

/* =====================================================================
   PLAY — a playable copy of the game for live demos.
   One person plays every team in turn. Each confirmed turn is saved as
   a normal logged action, so a played game fills Insights and the CSV
   export exactly like a watched one.
   ===================================================================== */
/* what is in the physical box */
const BOX={r1:20,r3:15,h1:20,h2:15,waste:20};
const BOX_LABEL={r1:'R1 tokens',r3:'R3 tokens',h1:'small houses',h2:'large houses',waste:'waste tokens'};

/* the island: a hexagon of 37 cells with the centre missing — 36 playable
   hexes ringing a hole. Neighbours found by centre distance. */
const HEX_R=28,HEX_W=Math.sqrt(3)*HEX_R,HEX_CX=192,HEX_CY=160;
const HEX_HOLE={x:HEX_CX,y:HEX_CY};
const HEXES=(()=>{const out=[];let i=0;
  for(let r=-3;r<=3;r++)for(let q=Math.max(-3,-3-r);q<=Math.min(3,3-r);q++){
    if(q===0&&r===0)continue;
    out.push({i:i++,x:HEX_CX+HEX_W*(q+r/2),y:HEX_CY+1.5*HEX_R*r});}
  return out;})();
const HEX_ADJ=HEXES.map(h=>HEXES.filter(o=>o.i!==h.i&&Math.hypot(o.x-h.x,o.y-h.y)<HEX_W*1.15).map(o=>o.i));
function hexPoly(cx,cy){return Array.from({length:6},(_,k)=>{const a=Math.PI/180*(60*k-90);
  return (cx+(HEX_R-1.5)*Math.cos(a)).toFixed(1)+','+(cy+(HEX_R-1.5)*Math.sin(a)).toFixed(1);}).join(' ');}
const HEX_PTS=HEXES.map(h=>hexPoly(h.x,h.y));
const HEX_VB='0 0 384 320';

function hexDist(a,b){return Math.hypot(HEXES[a].x-HEXES[b].x,HEXES[a].y-HEXES[b].y);}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* the running game lives inside the current session, so it survives reloads
   and travels with the JSON backup */
function game(){const w=cur();return w?(w.sessions[S.ui.session].game||null):null;}
function freeHexes(g){const out=[];for(let i=0;i<36;i++)if(!g.cells[i])out.push(i);return out;}
function boardCounts(g){const n={small:0,large:0,r1:0,r3:0,waste:0};Object.values(g.cells).forEach(c=>n[c.k]++);return n;}
function drawToken(g){const t=g.supply.r1+g.supply.r3;if(t<=0)return null;
  const k=Math.random()*t<g.supply.r1?'r1':'r3';g.supply[k]--;return k;}
function adjFree(g,i){return HEX_ADJ[i].filter(n=>!g.cells[n]);}
/* spare value sitting on resource tokens NEXT TO hex i — the only value a build there can use */
function adjSpare(g,i){return HEX_ADJ[i].reduce((s,n)=>{const c=g.cells[n];
  return s+((c&&(c.k==='r1'||c.k==='r3'))?(c.v||0):0);},0);}
function boardSpare(g){return Object.values(g.cells).reduce((s,c)=>s+((c.k==='r1'||c.k==='r3')?(c.v||0):0),0);}
function handValue(h){return h.r1+3*h.r3;}
/* spend spare value from tokens next to hex i, biggest first */
function drawFromBoard(g,i,amount){let left=amount;
  HEX_ADJ[i].map(n=>g.cells[n]).filter(c=>c&&(c.k==='r1'||c.k==='r3')&&(c.v||0)>0)
    .sort((a,b)=>(b.v||0)-(a.v||0)).forEach(c=>{if(left<=0)return;const take=Math.min(c.v,left);c.v-=take;left-=take;});}
/* what can pay for this action AT this hex — board value only counts if it sits beside the hex */
function payCombos(g,tid,action,hexI){
  const h=g.hands[tid],out=[];
  if(action==='renovate'){
    if(adjFree(g,hexI).length<1)return out;          // the payment token needs a free hex beside the house
    if(h.r1>=1)out.push({lab:'1 R1',r1:1,r3:0,fb:0,tag:'usual'});
    if(h.r3>=1)out.push({lab:'1 R3',r1:0,r3:1,fb:0,tag:'leaves 3 free'});
    return out;}
  const spare=adjSpare(g,hexI),freeAdj=adjFree(g,hexI).length;
  (PAID_OPTIONS[action]||[]).forEach(([lab,r1,r3,fb,tag])=>{
    if(h.r1>=r1&&h.r3>=r3&&spare>=fb&&freeAdj>=r1+r3)out.push({lab,r1,r3,fb,tag});});
  return out;}
/* exact ways to pay value 3 per waste from hand (R3s, R1-triples, or a mix) */
function wasteCombos(h,n){const out=[];
  for(let x=Math.min(h.r3,n);x>=0;x--){const r1=3*(n-x);
    if(h.r1>=r1)out.push({lab:(x?x+' R3':'')+(x&&r1?' + ':'')+(r1?r1+' R1':''),r3:x,r1,fb:0});}
  return out;}
function canAct(g,tid,action){const bc=boardCounts(g),h=g.hands[tid];
  if(action==='build_small')return g.supply.h1>0&&freeHexes(g).some(i=>payCombos(g,tid,'build_small',i).length);
  if(action==='build_large')return g.supply.h2>0&&freeHexes(g).some(i=>payCombos(g,tid,'build_large',i).length);
  if(action==='renovate')return g.supply.h1>0&&(h.r1+h.r3)>=1&&
    Object.keys(g.cells).some(i=>g.cells[i].k==='large'&&adjFree(g,+i).length>=1);
  if(action==='remove_waste')return bc.waste>0&&handValue(h)>=3;
  return false;}
function whyNot(g,tid,a){const h=g.hands[tid];
  if(a==='build_small'){if(g.supply.h1<=0)return'no small houses left in the box';return'no hex it can pay for';}
  if(a==='build_large'){if(g.supply.h2<=0)return'no large houses left in the box';return'no hex it can pay for';}
  if(a==='renovate'){if(g.supply.h1<=0)return'no small houses left in the box';if((h.r1+h.r3)<1)return'needs 1 token from hand';return'no large house with a free hex beside it';}
  if(a==='remove_waste'){if(!boardCounts(g).waste)return'no waste on the board';return'needs value 3 per waste (1 R3 or 3 R1)';}
  return'';}
function playScores(w,g){const acts=allActions(w).filter(a=>a.session===S.ui.session);
  return w.teams.map(t=>{const pts=acts.filter(a=>a.teamId===t.id).reduce((s,a)=>s+actionPoints(a),0);
    const h=g.hands[t.id]||{r1:0,r3:0};return {team:t,pts,held:h.r1+h.r3,total:pts+h.r1+h.r3,hand:h};})
    .sort((a,b)=>b.total-a.total);}
function teamTag(w,tid){const t=w.teams.find(x=>x.id===tid);if(!t)return'';
  const m=t.name.match(/(\d+)\s*$/);return m?'T'+m[1]:t.name.slice(0,2).toUpperCase();}

/* ---- game lifecycle ---- */
let playDraft=null;
function freshDraft(){return{action:'',hex:null,combo:null,tokHexes:[],wasteSel:[],wastePay:null,give:{},crosstalk:false,statedGoal:false,anticipated:false,leverage:null,notes:''};}
function startGame(){
  const w=cur();if(!w)return;const sNum=S.ui.session,sess=w.sessions[sNum];
  if(Object.values(sess.rounds).some(r=>r.actions.length)&&
     !confirm('Session '+sNum+' already has logged actions. Playing replaces them. Continue?'))return;
  Object.values(sess.rounds).forEach(r=>{r.actions=[];r.closed=false;delete r.greenOverride;r.wasteAdded=0;r.biodegrade=0;});
  sess.outcome={result:'',collapseRound:null,winner:'',notes:''};
  const g={status:'playing',round:1,turn:0,cells:{},supply:{...BOX},hands:{},pendingShare:{},result:null,collapseRound:null};
  w.teams.forEach(t=>{g.hands[t.id]={r1:0,r3:0};for(let i=0;i<2;i++){const k=drawToken(g);if(k)g.hands[t.id][k]++;}});
  sess.game=g;S.ui.round=1;playDraft=freshDraft();save();renderPlay();
  toast('Game on — every team drew 2 random tokens');
}
function quitGame(){if(!confirm('Stop this game? Turns already confirmed stay in the data.'))return;
  delete cur().sessions[S.ui.session].game;playDraft=null;save();renderPlay();}
function playSetSession(n){S.ui.session=n;S.ui.round=1;playDraft=null;save();renderPlay();}
function syncPlayInputs(){if(!playDraft)return;const n=document.getElementById('p_notes');if(n)playDraft.notes=n.value;}
function rerenderPlay(){syncPlayInputs();const y=window.scrollY;renderPlay();window.scrollTo(0,y);}

/* ---- turn flow ---- */
function pickAction(a){const g=game(),t=cur().teams[g.turn],d=playDraft;
  if(!canAct(g,t.id,a))return;
  d.action=a;d.hex=null;d.combo=null;d.tokHexes=[];d.wasteSel=[];d.wastePay=null;
  rerenderPlay();}
function pickCombo(idx){const g=game(),t=cur().teams[g.turn],d=playDraft;
  const cs=payCombos(g,t.id,d.action,d.hex);if(!cs[idx])return;
  d.combo=cs[idx];d.tokHexes=[];rerenderPlay();}
function pickWasteCombo(idx){const g=game(),t=cur().teams[g.turn],d=playDraft;
  const cs=wasteCombos(g.hands[t.id],d.wasteSel.length);if(!cs[idx])return;
  d.wastePay=cs[idx];rerenderPlay();}
function togTag(f){playDraft[f]=!playDraft[f];rerenderPlay();}
function togLev(v){playDraft.leverage=playDraft.leverage===v?null:v;rerenderPlay();}
function resetTurn(){playDraft=freshDraft();rerenderPlay();}
function stagedGive(d,kind){return Object.values(d.give).reduce((s,o)=>s+o[kind],0);}
function stagedPay(d,kind){if(d.action==='remove_waste')return d.wastePay?d.wastePay[kind]:0;
  return d.combo?d.combo[kind]:0;}
function giveTok(kind){const g=game(),w=cur(),t=w.teams[g.turn],d=playDraft;
  const sel=document.getElementById('giveTeam');if(!sel||!sel.value)return;
  if(g.hands[t.id][kind]-stagedPay(d,kind)-stagedGive(d,kind)<1){toast('No spare '+kind.toUpperCase()+' to give');return;}
  (d.give[sel.value]=d.give[sel.value]||{r1:0,r3:0})[kind]++;rerenderPlay();}
function clearGive(){playDraft.give={};rerenderPlay();}
function hexTap(i){const g=game();if(!g||g.status!=='playing'||!playDraft)return;
  const w=cur(),t=w.teams[g.turn],d=playDraft;if(!d.action)return;
  if(d.action==='build_small'||d.action==='build_large'){
    // a tap next to the chosen spot places (or lifts) a paid token; other taps move the house
    if(d.hex!=null&&d.combo&&!g.cells[i]&&HEX_ADJ[d.hex].includes(i)){
      const at=d.tokHexes.indexOf(i);
      if(at>=0)d.tokHexes.splice(at,1);
      else if(d.tokHexes.length<d.combo.r1+d.combo.r3)d.tokHexes.push(i);
      else if(d.combo.r1+d.combo.r3>0)toast('All paid tokens are placed — tap one to lift it');}
    else if(!g.cells[i]&&payCombos(g,t.id,d.action,i).length){
      d.hex=i;d.combo=payCombos(g,t.id,d.action,i)[0];d.tokHexes=[];}
    else if(!g.cells[i])toast('Nothing in hand or beside that hex can pay for a build there');
  }else if(d.action==='renovate'){
    if(g.cells[i]&&g.cells[i].k==='large'){
      if(!adjFree(g,i).length){toast('No free hex beside that house for the payment token');return;}
      d.hex=i;d.combo=payCombos(g,t.id,'renovate',i)[0]||null;d.tokHexes=[];}
    else if(d.hex!=null&&!g.cells[i]&&HEX_ADJ[d.hex].includes(i)){d.tokHexes=[i];}
  }else if(d.action==='remove_waste'){
    if(!(g.cells[i]&&g.cells[i].k==='waste'))return;
    const at=d.wasteSel.indexOf(i);
    if(at>=0)d.wasteSel.splice(at,1);
    else{if((d.wasteSel.length+1)*3>handValue(g.hands[t.id])){toast('Each waste costs value 3 (1 R3 or 3 R1) — not enough in hand');return;}d.wasteSel.push(i);}
    d.wastePay=wasteCombos(g.hands[t.id],d.wasteSel.length)[0]||null;
  }else return;
  rerenderPlay();}
function skipTurn(){const w=cur(),g=game();playDraft=freshDraft();g.turn++;
  if(g.turn>=w.teams.length){closePlayRound();return;}save();renderPlay();}

function confirmTurn(){
  syncPlayInputs();
  const w=cur(),g=game(),sNum=S.ui.session,t=w.teams[g.turn],d=playDraft,h=g.hands[t.id];
  let spentR1=0,spentR3=0,fromBoard=0,conn=0,connOther=0,renovOther=false,wasteN=0;
  // everything staged (payment + gifts) must still fit in the hand
  if(h.r1<stagedPay(d,'r1')+stagedGive(d,'r1')||h.r3<stagedPay(d,'r3')+stagedGive(d,'r3')){
    toast('Not enough tokens in hand for the payment and the gifts together');return;}
  if(d.action==='build_small'||d.action==='build_large'){
    if(d.hex==null||!d.combo||d.tokHexes.length!==d.combo.r1+d.combo.r3)return;
    const neigh=HEX_ADJ[d.hex].map(n=>g.cells[n]).filter(c=>c&&(c.k==='small'||c.k==='large'));
    conn=neigh.length;connOther=neigh.filter(c=>c.team!==t.id).length;
    spentR1=d.combo.r1;spentR3=d.combo.r3;fromBoard=d.combo.fb;
    g.cells[d.hex]={k:d.action==='build_small'?'small':'large',team:t.id};
    g.supply[d.action==='build_small'?'h1':'h2']--;
    h.r1-=spentR1;h.r3-=spentR3;
    drawFromBoard(g,d.hex,fromBoard);                     // spend spare value sitting beside the hex
    // paid tokens go where the player put them; any overpay stays usable on the R3
    const surplus=Math.max(0,spentR1+3*spentR3+fromBoard-(d.action==='build_small'?1:2));
    const kinds=[];for(let k=0;k<spentR3;k++)kinds.push('r3');for(let k=0;k<spentR1;k++)kinds.push('r1');
    d.tokHexes.forEach((hx,j)=>{g.cells[hx]={k:kinds[j],v:(kinds[j]==='r3'&&j===0)?surplus:0};});
  }else if(d.action==='renovate'){
    if(d.hex==null||!d.combo||d.tokHexes.length!==1)return;
    renovOther=g.cells[d.hex].team!==t.id;
    g.cells[d.hex].k='small';g.supply.h2++;g.supply.h1--;
    spentR1=d.combo.r1;spentR3=d.combo.r3;
    h.r1-=spentR1;h.r3-=spentR3;
    // the payment token stays on the board beside the house, its full value free for any neighbour
    const kind=spentR3?'r3':'r1';
    g.cells[d.tokHexes[0]]={k:kind,v:kind==='r3'?3:1};
  }else if(d.action==='remove_waste'){
    if(!d.wasteSel.length||!d.wastePay)return;
    wasteN=d.wasteSel.length;
    d.wasteSel.forEach(i=>{delete g.cells[i];g.supply.waste++;});
    spentR1=d.wastePay.r1;spentR3=d.wastePay.r3;
    h.r1-=spentR1;h.r3-=spentR3;g.supply.r1+=spentR1;g.supply.r3+=spentR3;   // clean-up cost goes to the box
  }else return;
  // earn: +1 random token from the box per house touched (anyone's house counts)
  const earned=[];for(let k=0;k<conn;k++){const tok=drawToken(g);if(tok){h[tok]++;earned.push(tok);}}
  // gifts to other teams
  let givenTotal=0;
  Object.entries(d.give).forEach(([tid,o])=>{const n=o.r1+o.r3;if(!n)return;
    h.r1-=o.r1;h.r3-=o.r3;g.hands[tid].r1+=o.r1;g.hands[tid].r3+=o.r3;givenTotal+=n;
    const rd0=w.sessions[sNum].rounds[g.round];
    const prior=rd0.actions.find(x=>x.teamId===tid);
    if(prior)prior.sharedReceived=(prior.sharedReceived||0)+n;
    else g.pendingShare[tid]=(g.pendingShare[tid]||0)+n;});
  // save the turn as a normal logged action — same shape Observe writes
  const rec={teamId:t.id,action:d.action,spentR1,spentR3,fromBoard,
    connections:conn,touchedOther:connOther,renovatedOther:renovOther,wasteRemoved:wasteN,
    sharedGiven:givenTotal,sharedReceived:g.pendingShare[t.id]||0,
    crosstalk:d.crosstalk,statedGoal:d.statedGoal,anticipated:d.anticipated,
    leverage:d.leverage,notes:d.notes,viaPlay:true};
  delete g.pendingShare[t.id];
  const rd=w.sessions[sNum].rounds[g.round];
  const idx=rd.actions.findIndex(x=>x.teamId===t.id);
  if(idx>=0)rd.actions[idx]=rec;else rd.actions.push(rec);
  if(earned.length)toast(t.name+' earned '+earned.map(k=>k.toUpperCase()).join(' + ')+' — touched '+conn+' house'+(conn===1?'':'s')+(connOther?' ('+connOther+' another team’s)':''));
  playDraft=freshDraft();
  g.turn++;
  if(freeHexes(g).length===0&&g.round<w.numRounds){endGame('collapse');return;}
  if(g.turn>=w.teams.length){closePlayRound();return;}
  save();renderPlay();
}

/* ---- end of round: clean-up, then the houses make waste ---- */
function closePlayRound(){
  const w=cur(),g=game(),sNum=S.ui.session,r=g.round,rd=w.sessions[sNum].rounds[r];
  rd.closed=true;
  let cleaned=0;
  if(r>1){const free=freeHexes(g).length;
    const wc=shuffle(Object.keys(g.cells).filter(i=>g.cells[i].k==='waste'));
    cleaned=Math.min(Math.floor(free/2),wc.length);
    wc.slice(0,cleaned).forEach(i=>{delete g.cells[i];g.supply.waste++;});}
  const bc=boardCounts(g);let due=bc.small+2*bc.large,placedW=0,shortSupply=0,shortSpace=0;
  const free=shuffle(freeHexes(g));
  while(due>0){
    if(g.supply.waste<=0){shortSupply=due;break;}
    if(placedW>=free.length){shortSpace=due;break;}
    g.cells[free[placedW]]={k:'waste'};g.supply.waste--;placedW++;due--;}
  rd.biodegrade=cleaned;rd.wasteAdded=placedW;
  let msg='Round '+r+' closed — '+(cleaned?'forest cleared '+cleaned+' waste · ':'')+placedW+' waste added';
  if(shortSupply)msg+=' · the box ran out of waste tokens';
  toast(msg);
  if(shortSpace>0||(freeHexes(g).length===0&&r<w.numRounds)){endGame('collapse');return;}
  if(r>=w.numRounds){endGame('done');return;}
  g.round++;g.turn=0;S.ui.round=g.round;
  w.sessions[sNum].rounds[g.round].greenOverride=freeHexes(g).length;
  playDraft=freshDraft();save();renderPlay();
}
function endGame(kind){
  const w=cur(),g=game(),sess=w.sessions[S.ui.session];
  g.status='ended';playDraft=null;
  if(kind==='collapse'){g.result='collapse';g.collapseRound=g.round;
    sess.outcome={result:'collapse',collapseRound:g.round,winner:'',notes:'Played live in the tool — the island filled in round '+g.round+'.'};}
  else{const sc=playScores(w,g),elig=sc.filter(s=>s.held>0);
    const top=elig.length?Math.max(...elig.map(s=>s.total)):0;
    const winners=elig.filter(s=>s.total===top);
    if(winners.length===1){g.result='win';
      sess.outcome={result:'win',collapseRound:null,winner:winners[0].team.id,notes:'Played live in the tool.'};}
    else{g.result='survived';
      sess.outcome={result:'survived',collapseRound:null,winner:'',notes:'Played live in the tool.'};}}
  save();renderPlay();
}

function allActions(w){const out=[];Object.values(w.sessions).forEach(s=>Object.values(s.rounds).forEach(r=>r.actions.forEach(a=>out.push({...a,session:s.num,round:r.num}))));return out;}
function workshopStats(w){return {actions:allActions(w).length};}

/* indicators for a set of actions */
function indicators(acts){
  const n=acts.length||1;
  const care=acts.filter(a=>SYSTEM_CARE.includes(a.action)).length;
  const exp=acts.filter(a=>EXPANSION.includes(a.action)).length;
  const coopEvents=acts.reduce((s,a)=>s+((a.sharedGiven||0)+(a.sharedReceived||0)>0?1:0)+(a.crosstalk?1:0)+(a.statedGoal?1:0),0);
  const lev=acts.filter(a=>a.leverage);const deep=acts.filter(a=>a.leverage==='deep').length;
  const builds=acts.filter(a=>EXPANSION.includes(a.action));
  const conn=builds.reduce((s,a)=>s+(a.connections||0),0);
  return {
    n:acts.length,
    TOI: (care+exp)?care/(care+exp):0,                 // temporal orientation (regenerative share)
    CI: acts.length?coopEvents/(acts.length*3):0,       // cooperation intensity (0..1)
    LDR: lev.length?deep/lev.length:null,               // leverage depth ratio
    ANT: acts.length?acts.filter(a=>a.anticipated).length/acts.length:0,
    shares: acts.reduce((s,a)=>s+(a.sharedGiven||0)+(a.sharedReceived||0),0),
    connRatio: builds.length?conn/builds.length:0,
    care,exp,deep,levN:lev.length
  };
}
/* per-team pattern + systems-play score, sorted strongest→weakest */
function teamDiagnostics(w,acts){
  return w.teams.map(t=>{
    const ta=acts.filter(a=>a.teamId===t.id);
    const ind=indicators(ta);
    const expRatio=(ind.care+ind.exp)?ind.exp/(ind.care+ind.exp):0;
    const score=ind.TOI*0.4+ind.CI*0.4+(ind.LDR||0)*0.1+ind.ANT*0.1;
    let pattern,ptag;
    if(ta.length<3){pattern='too few actions';ptag='';}
    else if(ind.CI>=0.25&&ind.TOI>=0.35){pattern='collaborative · long-term';ptag='good';}
    else if(ind.CI<0.12&&expRatio>0.7){pattern='competitive · short-term';ptag='bad';}
    else {pattern='developing';ptag='warn';}
    return {team:t,n:ta.length,ind,expRatio,score,pattern,ptag,
            pts:ta.reduce((s,a)=>s+actionPoints(a),0)};
  }).sort((a,b)=>b.score-a.score);
}
/* coverage: how much the facilitator actually tagged (so absence isn't misread as zero) */
function coverage(acts){
  const n=acts.length||1;
  return {
    lev: acts.filter(a=>a.leverage).length/n,
    beh: acts.filter(a=>a.leverage||a.crosstalk||a.statedGoal||a.anticipated||a.sharedGiven||a.sharedReceived).length/n
  };
}
function sessionMetrics(w,sNum){
  const acts=allActions(w).filter(a=>a.session===sNum);
  const ind=indicators(acts);
  // board health: peak waste & end occupancy
  let peakWaste=0,endOcc=0;
  for(let r=1;r<=w.numRounds;r++){const b=liveBoard(w,sNum,r);peakWaste=Math.max(peakWaste,b.waste);endOcc=36-b.green;}
  const o=w.sessions[sNum].outcome;
  return {...ind,peakWaste,endOcc:Math.round(endOcc/36*100),outcome:o.result,collapseRound:o.collapseRound};
}

function actionPoints(a){if(a.action==='remove_waste')return (a.wasteRemoved||0);return ACTIONS[a.action]?.pts||0;}

/* recommendation engine — pattern → interpretation → debrief lever */
function recommendations(w,sm,mAll){
  const R=[];
  const last=sm[sm.length-1]||{};
  const first=sm[0]||{};
  // team to watch — name the specific lagging team and a pairing with the exemplar
  const acts=allActions(w);
  const ranked=teamDiagnostics(w,acts).filter(d=>d.n>=3);
  if(ranked.length>=2){
    const lead=ranked[0], watch=ranked[ranked.length-1];
    if(watch.score < lead.score-0.08){
      R.push(['warn',`Team to watch: ${esc(watch.team.name)}`,
        `${esc(watch.team.name)} has the lowest score for working together and planning ahead so far. ${esc(lead.team.name)} has the highest. Seat the two teams near each other next round. In the debrief, ask ${esc(lead.team.name)} to say out loud how they decided, so the other teams hear it.`]);
    }
  }
  // competing on a shared board
  if(mAll.CI<0.12 && mAll.TOI<0.25){
    R.push(['warn','Teams are competing on a shared board','Teams build a lot for points. They share little and rarely name a shared goal. In the debrief, point out that the rules never forbid sharing. Ask the room: "what goal do all the teams share?"']);
  }
  // small tweaks only
  if(mAll.levN>=3 && (mAll.LDR??1)<0.34){
    R.push(['warn','Teams make small tweaks','Most marked actions change a house size or place. Few change a rule or the goal. In the debrief, ask each team to name the result it wants at round six, then work back from there. Point to bigger actions: pool resources, or agree a shared goal.']);
  }
  // acts before planning
  if(mAll.ANT<0.2){
    R.push(['warn','Teams act before working out the result','Few actions show a team thinking ahead. Before each action, ask the team to say one sentence about what the action will do. This builds the habit of planning.']);
  }
  // builds apart, runs low on resources
  if(mAll.connRatio<0.6 && mAll.exp>=4){
    R.push(['warn','Teams build apart and run low on resources','Houses sit on their own, so teams earn few resources. A team earns resources only by building next to other houses. Point this out in the debrief.']);
  }
  // protecting more
  if(sm.length>1){
    if(last.TOI>first.TOI+0.1) R.push(['good','Teams are protecting the island more','Actions that protect the island rose from '+pct(first.TOI)+' to '+pct(last.TOI)+' across sessions. Name this in the debrief so the teams own the change.']);
    if(last.CI>first.CI+0.08) R.push(['good','Teams are working together more','Cross-team actions rose across sessions. Ask the teams: "what made you start working together, and why so late?"']);
  }
  // board filled
  const collapses=sm.filter(x=>x.outcome==='collapse');
  if(collapses.length){
    R.push(['warn',`The board filled in ${collapses.length} session(s)`,'A shared loss is useful. Teams often discuss a hard topic more calmly once they have all lost together. In the debrief, treat the loss as shared data. Then plan the next attempt.']);
  }
  // strong state
  if(!R.length || (mAll.CI>0.25&&mAll.TOI>0.4)){
    R.unshift(['good','Teams work together and plan ahead','Working together and protecting the island are both high. Push further. Ask teams to weigh the cost of each build, the point they discuss least. Ask them to name the changes that helped.']);
  }
  return R.slice(0,6).map(([c,h,p])=>`<div class="rec ${c}"><h4>${h}</h4><p>${p}</p></div>`).join('');
}

/* =====================================================================
   CHARTS (inline SVG, no libraries)
   ===================================================================== */
function barChart(data,color){
  if(!data.length)return'<p class="muted">No data.</p>';
  const max=Math.max(1,...data.map(d=>d.y));
  const n=data.length, slot=74, W=Math.max(300,n*slot), H=184, top=22, bot=48, plotH=H-top-bot, bw=Math.min(46,slot*0.5);
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:200px">
    ${data.map((d,i)=>{const cx=(i+.5)*(W/n);const h=(d.y/max)*plotH;const y=top+plotH-h;
      const words=String(d.x).split(' ');
      return `<rect x="${cx-bw/2}" y="${y}" width="${bw}" height="${h}" rx="5" fill="${color}"/>
        <text x="${cx}" y="${y-6}" text-anchor="middle" font-size="12" font-weight="700" fill="#16282f">${d.y}</text>
        <text x="${cx}" y="${top+plotH+16}" text-anchor="middle" font-size="11" fill="#5d7079">${words.map((wd,j)=>`<tspan x="${cx}" dy="${j===0?0:12}">${esc(wd)}</tspan>`).join('')}</text>`;}).join('')}
  </svg>`;
}
function lineChart(title,data,unit,color){
  if(!data.length)return'';
  const W=300,H=120,pad=26;const max=unit==='%'?1:Math.max(1,...data.map(d=>d.y));
  const xs=i=>pad+(data.length===1?(W-2*pad)/2:i*((W-2*pad)/(data.length-1)));
  const ys=y=>H-pad-(y/max)*(H-2*pad);
  const pts=data.map((d,i)=>`${xs(i)},${ys(d.y)}`).join(' ');
  return `<div style="margin-bottom:.7rem"><small class="muted" style="font-weight:600">${title}</small>
    <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:auto;max-height:130px">
      <line x1="${pad}" y1="${H-pad}" x2="${W-6}" y2="${H-pad}" stroke="#e2e8ea"/>
      <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
      ${data.map((d,i)=>`<circle cx="${xs(i)}" cy="${ys(d.y)}" r="4" fill="${color}"/>
        <text x="${xs(i)}" y="${ys(d.y)-8}" text-anchor="middle" font-size="10" font-weight="700" fill="#16282f">${unit==='%'?pct(d.y):d.y}</text>
        <text x="${xs(i)}" y="${H-8}" text-anchor="middle" font-size="10" fill="#5d7079">${esc(d.x)}</text>`).join('')}
    </svg></div>`;
}

/* =====================================================================
   DATA / EXPORT
   ===================================================================== */
function renderData(){
  const v=document.getElementById('view-data');const w=cur();
  const rows=w?allActions(w):[];
  const table=w&&rows.length?`<div class="scroll"><table>
    <thead><tr><th>S</th><th>R</th><th>Team</th><th>Action</th><th>Pts</th><th>Spent R1</th><th>Spent R3</th><th>Touched→gain</th><th>WasteRm</th><th>Share+/−</th><th>Marks</th><th>Change</th></tr></thead>
    <tbody>${rows.map(a=>{const t=w.teams.find(x=>x.id===a.teamId);return `<tr>
      <td>${a.session}</td><td>${a.round}</td><td>${esc(t?.name||'?')}</td>
      <td>${ACTIONS[a.action].short}</td><td>${actionPoints(a)}</td>
      <td>${a.spentR1||0}</td><td>${a.spentR3||0}</td>
      <td>${a.connections||0}</td><td>${a.wasteRemoved||0}</td><td>+${a.sharedGiven||0}/−${a.sharedReceived||0}</td>
      <td>${flagTags(a)||'—'}</td><td>${a.leverage==='deep'?'big':a.leverage==='shallow'?'small':'—'}</td></tr>`;}).join('')}</tbody></table></div>`
    :'<p class="muted">No actions logged yet.</p>';

  v.innerHTML=`
  <div class="card">
    <span class="eyebrow">Data &amp; export</span>
    <h1>Your data, ready for statistics</h1>
    <p class="muted" style="max-width:760px">Export is <strong>tidy</strong> — one row per team-turn — so it drops straight into R, SPSS, Python or a spreadsheet. Each workshop adds observations; as cohorts accumulate, between-group comparisons and session-1-vs-3 paired tests become generalisable.</p>
    <div class="row" style="margin-top:.6rem">
      <button class="btn primary" onclick="exportCSV()" ${w?'':'disabled'}>⬇ Actions CSV</button>
      <button class="btn" onclick="exportSummaryCSV()" ${w?'':'disabled'}>⬇ Session-summary CSV</button>
      <button class="btn" onclick="exportJSON()">⬇ Full backup (JSON)</button>
      <label class="btn" style="position:relative;overflow:hidden">⬆ Import JSON
        <input type="file" accept=".json" onchange="importJSON(event)" style="position:absolute;inset:0;opacity:0;cursor:pointer"></label>
    </div>
  </div>
  ${w?`<div class="card"><div class="row spread"><h3>${esc(w.name)} — raw log</h3><small class="muted">${rows.length} rows</small></div>${table}</div>`:'<div class="card">'+noWorkshop()+'</div>'}
  <div class="card">
    <h3>What each field and number means</h3>
    <div class="scroll"><table><thead><tr><th>Field or number</th><th>How it is worked out</th><th>What it shows</th></tr></thead><tbody>
      <tr><td>action</td><td>build small, build large, renovate, or remove waste</td><td>the action a team made</td></tr>
      <tr><td>housesTouched / resGained</td><td>houses the new house touched (each earns 1 resource)</td><td>the resources a team earned that action</td></tr>
      <tr><td>Protecting the island</td><td>(renovate + remove waste) ÷ all actions</td><td>how often a team keeps the island livable</td></tr>
      <tr><td>Working together</td><td>(shares + cross-team talk + shared-goal marks) ÷ (actions × 3)</td><td>how often teams act together</td></tr>
      <tr><td>Big changes</td><td>big-change marks ÷ all marked actions</td><td>how often a team changes a rule or the goal</td></tr>
      <tr><td>Thinking ahead</td><td>think-ahead marks ÷ all actions</td><td>how often a team plans before moving</td></tr>
      <tr><td>Touched per build</td><td>houses touched ÷ number of builds</td><td>how a team earns its resources</td></tr>
      <tr><td>Highest waste / tiles filled</td><td>most waste on the board / share of 36 tiles used</td><td>how close the island came to filling</td></tr>
      <tr><td>touchedOtherTeams</td><td>of the houses touched, how many belonged to another team</td><td>building beside a rival pays — quiet interdependence</td></tr>
      <tr><td>renovatedOtherTeam</td><td>1 when the renovated large house belonged to another team</td><td>cleaning up someone else's footprint</td></tr>
      <tr><td>source</td><td>"observed" = logged while watching real teams; "played" = made on the Play screen</td><td>lets you keep demo games apart from real groups in analysis</td></tr>
    </tbody></table></div>
  </div>
  <div class="card">
    <h3 style="color:var(--waste)">Danger zone</h3>
    <button class="btn ghost" onclick="wipeAll()">Erase ALL local data</button>
  </div>`;
}
function csvCell(s){s=String(s??'');return /[",\n]/.test(s)?'"'+s.replace(/"/g,'""')+'"':s;}
function download(name,text,type){const b=new Blob([text],{type});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);}
function exportCSV(){const w=cur();if(!w)return;
  const head=['workshop','program','facilitator','date','session','round','team','action','points','spentR1','spentR3','usedFromBoard','surplusLeft','housesTouched','touchedOtherTeams','renovatedOtherTeam','resGained','wasteRemoved','sharedGiven','sharedReceived','crosstalk','statedGoal','anticipated','leverage','source','notes'];
  const lines=[head.join(',')];
  allActions(w).forEach(a=>{const t=w.teams.find(x=>x.id===a.teamId);
    lines.push([w.name,w.program,w.facilitator,w.date,a.session,a.round,t?.name||'',a.action,actionPoints(a),a.spentR1||0,a.spentR3||0,boardUse(a),surplusLeftBy(a),a.connections||0,a.touchedOther||0,a.renovatedOther?1:0,a.connections||0,a.wasteRemoved||0,a.sharedGiven||0,a.sharedReceived||0,a.crosstalk?1:0,a.statedGoal?1:0,a.anticipated?1:0,a.leverage||'',a.viaPlay?'played':'observed',a.notes||''].map(csvCell).join(','));});
  download(slug(w.name)+'_actions.csv',lines.join('\n'),'text/csv');toast('Actions CSV exported');
}
function exportSummaryCSV(){const w=cur();if(!w)return;
  const head=['workshop','program','session','n_actions','TOI','CI','LDR','ANT','peak_waste','end_occupancy_pct','outcome','collapse_round'];
  const lines=[head.join(',')];
  Object.keys(w.sessions).map(Number).forEach(s=>{const m=sessionMetrics(w,s);
    lines.push([w.name,w.program,s,m.n,r3(m.TOI),r3(m.CI),m.LDR==null?'':r3(m.LDR),r3(m.ANT),m.peakWaste,m.endOcc,m.outcome||'',m.collapseRound||''].map(csvCell).join(','));});
  download(slug(w.name)+'_session_summary.csv',lines.join('\n'),'text/csv');toast('Summary CSV exported');
}
function exportJSON(){download('tipping_point_backup.json',JSON.stringify(S,null,2),'application/json');toast('Backup exported');}
function importJSON(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const d=JSON.parse(rd.result);
    if(d.workshops){if(confirm('Replace all current data with this file?')){S=d;}}
    else if(d.id&&d.sessions){S.workshops.push(d);S.currentId=d.id;} // single workshop
    save();toast('Imported');go('home');
  }catch(err){alert('Could not read file: '+err.message);}};rd.readAsText(f);}
function wipeAll(){if(confirm('Erase ALL workshops permanently?')){localStorage.removeItem(KEY);S=load();go('home');}}

/* =====================================================================
   DEMO DATA — illustrates the session 1→3 learning arc
   ===================================================================== */
function loadDemo(){
  const w=newWorkshop({name:'Demo group — example data',program:'Demo',facilitator:'You',numSessions:3,numRounds:6});
  const T=w.teams.map(t=>t.id);
  const mk=(teamId,action,o={})=>({teamId,action,spentR1:(action==='build_small'||action==='renovate')?1:0,spentR3:(action==='build_large'||action==='remove_waste')?1:0,connections:0,wasteRemoved:action==='remove_waste'?1:0,sharedGiven:0,sharedReceived:0,crosstalk:false,statedGoal:false,anticipated:false,leverage:null,...o});
  // session 1: aggressive, individualistic
  for(let r=1;r<=6;r++)T.forEach((id,i)=>{w.sessions[1].rounds[r].actions.push(mk(id,r<5?'build_large':'build_small',{leverage:'shallow',connections:i%2}));w.sessions[1].rounds[r].closed=true;});
  w.sessions[1].outcome={result:'collapse',collapseRound:5,winner:'',notes:'Built fast, board saturated by R5.'};
  // session 2: constraints recognised, some sharing
  for(let r=1;r<=6;r++)T.forEach((id,i)=>{const a=r<=2?'build_large':(r===3?'build_small':(r===4?'renovate':'remove_waste'));w.sessions[2].rounds[r].actions.push(mk(id,a,{leverage:r>3?'deep':'shallow',crosstalk:r>=3,sharedReceived:r>=4&&i===0?1:0,sharedGiven:r>=4&&i===1?1:0,connections:1}));w.sessions[2].rounds[r].closed=true;});
  w.sessions[2].outcome={result:'survived',collapseRound:null,winner:T[0],notes:'Started sharing resources mid-game.'};
  // session 3: collective, anticipatory
  for(let r=1;r<=6;r++)T.forEach((id,i)=>{const a=r<=2?'build_small':(r===3?'build_large':(r===4?'renovate':'remove_waste'));w.sessions[3].rounds[r].actions.push(mk(id,a,{leverage:'deep',crosstalk:true,statedGoal:r<=2,anticipated:r>=2,sharedReceived:i===0?1:0,sharedGiven:i===1?1:0,connections:2}));w.sessions[3].rounds[r].closed=true;});
  w.sessions[3].outcome={result:'win',collapseRound:null,winner:T[2],notes:'Set shared goal from round 1, all survived.'};
  S.workshops.push(w);S.currentId=w.id;save();toast('Demo loaded');go('insights');
}

/* =====================================================================
   HELPERS
   ===================================================================== */
function esc(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function val(id){return (document.getElementById(id)?.value||'').trim();}
function pct(x){return Math.round((x||0)*100)+'%';}
function r3(x){return x==null?'':Math.round(x*1000)/1000;}
function delta(a,b,higherBetter){if(a==null||b==null)return null;const diff=b-a;if(Math.abs(diff)<0.005)return null;const up=diff>0;return {up:higherBetter?up:!up,txt:(diff>0?'+':'')+Math.round(diff*100)+'pp'};}
function slug(s){return String(s).toLowerCase().replace(/[^a-z0-9]+/g,'_').replace(/^_|_$/g,'')||'workshop';}
function noWorkshop(){return `<div class="empty"><div class="big">🏝️</div>No workshop selected. <a href="#" onclick="go('home');return false">Create or open one</a> to begin.</div>`;}

/* boot */
go(S.ui.tab||'home');
</script>
